apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: canary
  namespace: argo-rollouts
spec:
  replicas: 4
  selector:
    matchLabels:
      app: canary
  template:
    metadata:
      labels:
        app: canary
    spec:
      imagePullSecrets:
        - name: docker-registry-creds-secret
      containers:
        - name: canary
          image: ghcr.io/canary-io/canary:v1
          ports:
            - containerPort: 8080
  strategy:
    canary:
      canaryService: canary-app-canary
      stableService: canary-app-stable
      trafficRouting:
        nginx:
          stableIngress: canary-app-ingress
      steps:
        - setWeight: 25
        - pause: {}
        - setWeight: 50
        - pause: {}
        - setWeight: 75
        - analysis:
            templates:
              - templateName: prometheus-success-rate
            args:
              - name: service-name
                value: my-app
        - setWeight: 100