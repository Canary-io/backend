apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-rollouts
  namespace: argo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sa-admin-binding
subjects:
- kind: ServiceAccount
  name: argo-rollouts
  namespace: argo
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
