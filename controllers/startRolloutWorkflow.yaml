apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  namespace: argo
  generateName: start-rollout-
spec:
  serviceAccountName: argo-workflow
  entrypoint: rollout-pipeline

  arguments:
    parameters:
      - name: deployment-name
      - name: repo-url
      - name: image-name
      - name: tag
      - name: dockerfile-path
      - name: deployment-strategy
      - name: steps

  volumes:
    - name: workspace
      emptyDir: {}

    - name: docker-config
      secret:
        secretName: docker-registry-creds-secret

  templates:
    - name: rollout-pipeline
      steps:
        - - name: clone-repo
            template: git-clone
            arguments:
              parameters:
                - name: repo-url
                  value: "{{workflow.parameters.repo-url}}"

        - - name: build-image
            template: build-step
            arguments:
              parameters:
                - name: image-name
                  value: "{{workflow.parameters.image-name}}"
                - name: tag
                  value: "{{workflow.parameters.tag}}"
                - name: dockerfile-path
                  value: "{{workflow.parameters.dockerfile-path}}"
              artifacts:
                - name: repo
                  from: "{{steps.clone-repo.outputs.artifacts.repo}}"

        - - name: patch-rollout
            template: patch-rollout-step
            arguments:
              parameters:
                - name: deployment-name
                  value: "{{workflow.parameters.deployment-name}}"
                - name: image-name
                  value: "{{workflow.parameters.image-name}}"
                - name: tag
                  value: "{{workflow.parameters.tag}}"

    - name: git-clone
      inputs:
        parameters:
          - name: repo-url
      outputs:
        artifacts:
          - name: repo
            path: /workspace
            s3:
              endpoint: s3.amazonaws.com
              bucket: canary-repos
              key: path/in/bucket/my-output-artifact.tgz
              accessKeySecret:
                name: repo-store-s3-credentials
                key: accessKey
              secretKeySecret:
                name: repo-store-s3-credentials
                key: secretKey
      container:
        image: alpine/git
        command: [git, clone, --progress, --verbose]
        args:
          - "{{inputs.parameters.repo-url}}"
          - /workspace

    - name: build-step
      inputs:
        parameters:
          - name: image-name
          - name: tag
          - name: dockerfile-path
        artifacts:
          - name: repo
            path: /workspace
            s3:
              endpoint: s3.amazonaws.com
              bucket: canary-repos
              key: path/in/bucket/canary-artifact.tgz
              accessKeySecret:
                name: repo-store-s3-credentials
                key: accessKey
              secretKeySecret:
                name: repo-store-s3-credentials
                key: secretKey
      container:
        image: moby/buildkit:latest
        securityContext:
          privileged: true
        env:
          - name: DOCKER_CONFIG
            value: /docker-config
        volumeMounts:
          - name: docker-config
            mountPath: /docker-config/config.json
            subPath: .dockerconfigjson
        command: ["sh", "-c"]
        args:
          - |
            set -e

            echo "Checking docker auth config..."
            if [ ! -f /docker-config/config.json ]; then
              echo "Docker config not found"
              exit 1
            fi

            if ! grep -q "ghcr.io" /docker-config/config.json; then
              echo "No ghcr.io credentials found in docker config"
              exit 1
            fi

            DOCKERFILE_PATH="/workspace/{{inputs.parameters.dockerfile-path}}"
            DOCKERFILE_DIR="$(dirname "$DOCKERFILE_PATH")"

            echo "Checking for Dockerfile..."
            if [ ! -f "$DOCKERFILE_PATH" ]; then
              echo "Dockerfile NOT FOUND"
              echo "Looked for: $DOCKERFILE_PATH"
              exit 1
            fi

            echo "Building image with BuildKit..."
            buildctl-daemonless.sh build \
              --frontend dockerfile.v0 \
              --local context=/workspace \
              --local dockerfile="$DOCKERFILE_DIR" \
              --opt filename="$(basename "$DOCKERFILE_PATH")" \
              --output type=image,name=ghcr.io/canary-io/{{inputs.parameters.image-name}}:{{inputs.parameters.tag}},push=true

    - name: patch-rollout-step
      inputs:
        parameters:
          - name: deployment-name
          - name: image-name
          - name: tag
      container:
        image: alpine/k8s:1.32.13
        command: [sh, -c]
        args:
          - |
            set -e

            IMAGE_REF="ghcr.io/canary-io/{{inputs.parameters.image-name}}:{{inputs.parameters.tag}}"

            echo "Checking rollout exists"
            kubectl get rollout {{inputs.parameters.deployment-name}} -n argo-rollouts >/dev/null

            echo "Updating rollout image to $IMAGE_REF"
            kubectl patch rollout {{inputs.parameters.deployment-name}} \
              -n argo-rollouts \
              --type json \
              -p="[ \
                { \
                  \"op\": \"replace\", \
                  \"path\": \"/spec/template/spec/containers/0/image\", \
                  \"value\": \"$IMAGE_REF\" \
                } \
              ]"

            echo "Adding restart annotation"
            kubectl patch rollout {{inputs.parameters.deployment-name}} \
              -n argo-rollouts \
              --type merge \
              -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"canary.io/restartedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}}}}}"

            echo "Verifying rollout image"
            kubectl get rollout {{inputs.parameters.deployment-name}} \
              -n argo-rollouts \
              -o jsonpath='{.spec.template.spec.containers[0].image}'
            echo

            echo "Getting rollout"
            kubectl get rollout {{inputs.parameters.deployment-name}} -n argo-rollouts
